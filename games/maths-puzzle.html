<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Maths Puzzle</title>

<style>

:root{
--bg:#050510;
--panel:#131826;
--panel2:#1b2333;
--text:#ffffff;
--primary:#00e5ff;
--secondary:#ff00d4;
--success:#00ff88;
--danger:#ff3b5f;
--warning:#ffd500;
--radius:16px;
--speed:.2s;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Segoe UI,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

body{
display:flex;
justify-content:center;
align-items:center;
}

#game{
width:min(600px,100%);
height:100%;
display:flex;
flex-direction:column;
padding:18px;
}

.hidden{
display:none!important;
}

.screen{
display:none;
flex:1;
flex-direction:column;
}

.screen.active{
display:flex;
}

.card{
background:var(--panel);
border:1px solid rgba(255,255,255,.08);
border-radius:var(--radius);
padding:20px;
}

.title{
font-size:2.8rem;
text-align:center;
margin:25px 0 10px;
color:var(--primary);
}

.subtitle{
text-align:center;
margin-bottom:30px;
opacity:.8;
}

button{
background:var(--panel2);
color:white;
border:2px solid var(--primary);
padding:15px;
border-radius:12px;
font-size:1rem;
cursor:pointer;
transition:
background var(--speed),
transform var(--speed),
border-color var(--speed);
}

button:hover{
background:var(--primary);
color:black;
}

button:active{
transform:scale(.98);
}

.menu-buttons{
display:flex;
flex-direction:column;
gap:15px;
margin-top:auto;
margin-bottom:auto;
}

.hud{
display:flex;
justify-content:space-between;
margin-bottom:18px;
font-size:1.1rem;
}

.question{
font-size:3rem;
text-align:center;
padding:40px 10px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.answer{
height:75px;
font-size:1.4rem;
}

.progress{
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress div{
height:100%;
width:0%;
background:var(--secondary);
transition:width .25s;
}

@media(max-width:650px){

.question{
font-size:2.2rem;
}

.answer{
font-size:1.2rem;
height:65px;
}

.title{
font-size:2.2rem;
}

}

</style>

</head>
<body>

<div id="game">

<!-- ================= MENU ================= -->

<section id="menu" class="screen active">

<h1 class="title">🧮 Maths Puzzle</h1>

<p class="subtitle">
Neon Arcade Edition
</p>

<div class="card">

<h3>High Score</h3>

<h2 id="bestScore">0</h2>

<p>Total Coins:
<span id="totalCoins">0</span>
</p>

</div>

<div class="menu-buttons">

<button id="playBtn">
▶ Play
</button>

<button id="achievementBtn">
🏆 Achievements
</button>

<button id="settingsBtn">
⚙ Settings
</button>

</div>

</section>

<!-- ================= GAME ================= -->

<section id="gameScreen" class="screen">

<div class="hud">

<div>
❤️
<span id="lives">
3
</span>
</div>

<div>
⭐
<span id="score">
0
</span>
</div>

<div>
🪙
<span id="coins">
0
</span>
</div>

</div>

<div class="card">

<div class="question" id="question">

2 + 2

</div>

</div>

<div class="answers">

<button class="answer">0</button>

<button class="answer">0</button>

<button class="answer">0</button>

<button class="answer">0</button>

</div>

<div style="margin-top:20px">

Level
<span id="level">
1
</span>

<div class="progress">

<div id="xpBar"></div>

</div>

</div>

</section>

<!-- ================= RESULT ================= -->

<section id="result" class="screen">

<h1 class="title">

Game Over

</h1>

<div class="card">

<p>
Final Score
</p>

<h2 id="finalScore">
0
</h2>

<br>

<p>
Best Score
</p>

<h2 id="finalBest">
0
</h2>

<br>

<p>
Coins Earned
</p>

<h2 id="earnedCoins">
0
</h2>

</div>

<div class="menu-buttons">

<button id="againBtn">

Play Again

</button>

<button id="homeBtn">

Main Menu

</button>

</div>

</section>

<!-- ================= SETTINGS ================= -->

<section id="settings" class="screen">

<h1 class="title">

Settings

</h1>

<div class="card">

<label>

<input type="checkbox" id="soundToggle" checked>

Sound

</label>

<br><br>

<label>

<input type="checkbox" id="animationToggle" checked>

Animations

</label>

<br><br>

<label>

<input type="checkbox" id="themeToggle" checked>

Dark Theme

</label>

<br><br>

<button id="resetData">

Reset Save

</button>

</div>

<div class="menu-buttons">

<button id="backSettings">

Back

</button>

</div>

</section>

<!-- ================= ACHIEVEMENTS ================= -->

<section id="achievements" class="screen">

<h1 class="title">

Achievements

</h1>

<div
id="achievementList"
class="card"
style="flex:1;overflow:auto">

</div>

<div class="menu-buttons">

<button id="backAchievement">

Back

</button>

</div>

</section>

</div>
</body>
</html>
